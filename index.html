<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UHC - 속초 로컬 서사 퀴즈</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel (브라우저에서 JSX 실행을 위함) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- 커스텀 애니메이션 CSS -->
  <style>
    @keyframes blob {
      0% { transform: translate(0px, 0px) scale(1); }
      33% { transform: translate(30px, -50px) scale(1.1); }
      66% { transform: translate(-20px, 20px) scale(0.9); }
      100% { transform: translate(0px, 0px) scale(1); }
    }
    .animate-blob { animation: blob 7s infinite; }
    .animation-delay-2000 { animation-delay: 2s; }
    .animation-delay-4000 { animation-delay: 4s; }
    
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .animate-spin { animation: spin 1s linear infinite; }
    
    .animate-in { animation: fadeIn 0.5s ease-out forwards; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="bg-blue-50">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- 아이콘 컴포넌트 ---
    const IconMap = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/></svg>;
    const IconArrowRight = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>;
    const IconCheckCircle2 = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="M9 12l2 2 4-4"/></svg>;
    const IconXCircle = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>;
    const IconAward = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>;
    const IconSparkles = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>;
    const IconMapPin = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>;
    const IconChevronRight = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="9 18 15 12 9 6"/></svg>;
    const IconLoader2 = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>;

    // --- 메인 앱 컴포넌트 ---
    const App = () => {
      const [step, setStep] = useState('intro');
      const [currentQIndex, setCurrentQIndex] = useState(0);
      const [score, setScore] = useState(0);
      const [selectedOption, setSelectedOption] = useState(null);
      const [isCorrect, setIsCorrect] = useState(false);
      const [aiResult, setAiResult] = useState("");
      const [imgError, setImgError] = useState(false); // 로고 이미지 에러 처리용

      const apiKey = "";

      const quizData = [
        {
          question: "속초의 대표 명소 '아바이마을'. 여기서 '아바이'는 함경도 사투리로 어떤 뜻일까요?",
          options: ["바다의 신", "할아버지(아버지)", "오징어 배", "푸른 안개"],
          answer: 1,
          explanation: "6.25 전쟁 당시 남하한 함경도 출신 피난민들이 고향으로 돌아가지 못하고 정착한 곳입니다. 나이 드신 분들이 많아 함경도 사투리인 '아바이'를 따서 부르게 되었습니다."
        },
        {
          question: "돌에 부딪히는 파도 소리가 마치 '거문고' 소리처럼 들린다고 하여 이름 붙여진 속초의 아름다운 바위 정자는?",
          options: ["영랑정", "청초정", "해맞이정", "영금정"],
          answer: 3,
          explanation: "영금정(靈琴亭)은 파도가 바위에 부딪히는 소리가 신령한 거문고 소리 같다고 하여 붙여진 이름입니다. 속초의 가장 로맨틱한 밤바다를 볼 수 있는 곳이죠."
        },
        {
          question: "설악산의 명물 '울산바위'는 원래 어디서 출발해서 속초까지 걸어왔다는 재미있는 전설이 있을까요?",
          options: ["제주도 한라산", "경상도 울산", "북한 백두산", "서울 남산"],
          answer: 1,
          explanation: "조물주가 금강산을 만들 때 전국의 잘생긴 바위들을 불렀는데, 덩치가 커서 지각한 '울산'의 바위가 금강산에 가지 못하고 설악산에 주저앉았다는 전설이 있습니다."
        },
        {
          question: "피난민들이 고향의 맛을 잊지 못해, 속초에서 구하기 쉬운 해산물로 만들어 먹기 시작한 대표적인 향토 음식은?",
          options: ["명태회냉면", "오징어순대", "닭강정", "물회"],
          answer: 1,
          explanation: "돼지 창자를 구하기 어렵던 피난민들이 속초에 흔한 오징어 속에 찹쌀과 야채를 넣어 만든 것이 바로 속초 명물 '오징어순대'의 시작입니다."
        },
        {
          question: "오늘 밤, 여러분의 속초 여행을 가장 빛나게 만들어줄 타로 부스와 퍼스널컬러 부스는 UH플랫의 어디에 준비되어 있을까요?",
          options: ["지하 1층 주차장", "1층 로비", "옥상 루프탑", "객실 복도"],
          answer: 2,
          explanation: "정답입니다! 지금 바로 속초의 밤바다가 내려다보이는 '옥상 루프탑'으로 올라오시면, 저희가 준비한 특별한 파티가 시작됩니다."
        }
      ];

      const handleStart = () => {
        setStep('quiz');
        setCurrentQIndex(0);
        setScore(0);
      };

      const handleSelectOption = (index) => {
        setSelectedOption(index);
        const correct = index === quizData[currentQIndex].answer;
        setIsCorrect(correct);
        if (correct) setScore(score + 1);
        
        setTimeout(() => {
          setStep('explanation');
        }, 600);
      };

      const generateAIRecommendation = async (finalScore) => {
        setStep('analyzing');
        
        const prompt = `당신은 속초 UH플랫 호텔 파티의 신비로운 안내자입니다. 참가자가 속초 로컬 퀴즈 5문제 중 ${finalScore}문제를 맞혔습니다. 이 점수를 바탕으로, 오늘 밤 루프탑의 '타로 부스' 또는 '퍼스널컬러 진단' 중 하나를 참가자에게 추천하고 그 이유를 감성적이고 매혹적인 말투로 2~3문장으로 적어주세요. 참가자에게 직접 말하는 듯한 말투로 작성하고, 'AI', '인공지능', '제미나이', '시스템' 등의 단어는 절대 사용하지 마세요.`;

        let retries = 0;
        const maxRetries = 5;
        const delays = [1000, 2000, 4000, 8000, 16000];

        while (retries <= maxRetries) {
          try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                contents: [{ parts: [{ text: prompt }] }]
              })
            });

            if (!response.ok) throw new Error("API Request Failed");

            const data = await response.json();
            const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "오늘 밤, 루프탑에서 당신만의 신비로운 운명이 기다리고 있습니다. 타로 부스에서 그 해답을 찾아보세요.";
            setAiResult(text.replace(/"/g, ''));
            break; 
          } catch (error) {
            if (retries === maxRetries) {
              setAiResult("오늘 밤, 루프탑에서 당신만의 신비로운 운명이 기다리고 있습니다. 타로 부스에서 그 해답을 찾아보세요.");
              break;
            }
            await new Promise(res => setTimeout(res, delays[retries]));
            retries++;
          }
        }
        setStep('result');
      };

      const handleNext = () => {
        setSelectedOption(null);
        if (currentQIndex < quizData.length - 1) {
          setCurrentQIndex(currentQIndex + 1);
          setStep('quiz');
        } else {
          generateAIRecommendation(score);
        }
      };

      return (
        <div className="min-h-screen bg-gradient-to-br from-cyan-50 via-blue-50 to-white text-slate-800 font-sans flex flex-col items-center justify-center p-4 relative overflow-hidden">
          {/* 밝은 바다 느낌의 배경 장식 (블렌드 모드 변경) */}
          <div className="absolute top-0 left-0 w-full h-full overflow-hidden z-0 pointer-events-none">
            <div className="absolute top-[-10%] left-[-10%] w-72 h-72 bg-blue-300 rounded-full mix-blend-multiply filter blur-[80px] opacity-40 animate-blob"></div>
            <div className="absolute top-[20%] right-[-10%] w-80 h-80 bg-cyan-300 rounded-full mix-blend-multiply filter blur-[80px] opacity-40 animate-blob animation-delay-2000"></div>
            <div className="absolute bottom-[-20%] left-[20%] w-96 h-96 bg-teal-200 rounded-full mix-blend-multiply filter blur-[80px] opacity-50 animate-blob animation-delay-4000"></div>
          </div>

          <div className="w-full max-w-md bg-white/80 backdrop-blur-xl rounded-3xl shadow-[0_8px_40px_rgba(8,145,178,0.12)] overflow-hidden z-10 border border-white/60">
            
            {/* 메인 로고 영역 (제공된 UHC 이미지 적용) */}
            <div className="bg-white/50 p-5 flex items-center justify-center border-b border-blue-100/60 shadow-sm relative">
              {!imgError ? (
                <img 
                  src="image_f857b3.png" 
                  alt="UHC Urban Host Company" 
                  className="h-10 object-contain drop-shadow-sm rounded-sm"
                  onError={() => setImgError(true)}
                />
              ) : (
                <div className="flex items-center space-x-2">
                  <span className="font-extrabold text-2xl tracking-widest text-slate-800">UH FLAT</span>
                  <span className="font-medium text-sm text-cyan-600">더 속초점</span>
                </div>
              )}
            </div>

            <div className="p-6 min-h-[400px] flex flex-col relative">
              
              {step === 'intro' && (
                <div className="flex-1 flex flex-col items-center justify-center text-center space-y-6 animate-in">
                  <div className="w-24 h-24 bg-blue-100/80 rounded-full flex items-center justify-center border border-blue-200 shadow-inner mb-2">
                    <IconMap className="w-12 h-12 text-cyan-500" />
                  </div>
                  <div>
                    <h1 className="text-2xl font-extrabold text-slate-800 mb-2 leading-tight">
                      여행의 순간들을<br/><span className="text-cyan-600">더 특별하게 바꾸는 공간</span>
                    </h1>
                    <p className="text-slate-500 text-sm leading-relaxed">
                      단순한 휴식을 넘어, 속초의 숨겨진 이야기를 찾아보세요.<br/>
                      모든 퀴즈를 맞히신 분들께는<br/><span className="text-amber-500 font-bold">특별한 기념품</span>을 드립니다.
                    </p>
                  </div>
                  <button 
                    onClick={handleStart}
                    className="w-full mt-4 bg-gradient-to-r from-cyan-500 to-blue-500 hover:from-cyan-600 hover:to-blue-600 text-white font-bold py-4 px-6 rounded-xl flex items-center justify-center space-x-2 transition-all transform hover:scale-105 shadow-[0_4px_15px_rgba(6,182,212,0.3)]"
                  >
                    <span>퀘스트 시작하기</span>
                    <IconArrowRight className="w-5 h-5" />
                  </button>
                </div>
              )}

              {step === 'quiz' && (
                <div className="flex-1 flex flex-col animate-in">
                  <div className="flex justify-between items-center mb-6">
                    <span className="text-xs font-bold text-cyan-600 uppercase tracking-widest">
                      Mission {currentQIndex + 1} / {quizData.length}
                    </span>
                    <div className="flex space-x-1">
                      {quizData.map((_, idx) => (
                        <div 
                          key={idx} 
                          className={`h-1.5 rounded-full ${idx <= currentQIndex ? 'w-6 bg-cyan-500 shadow-sm' : 'w-2 bg-slate-200'} transition-all duration-300`}
                        />
                      ))}
                    </div>
                  </div>
                  
                  <h2 className="text-lg font-bold text-slate-800 mb-8 leading-relaxed">
                    {quizData[currentQIndex].question}
                  </h2>
                  
                  <div className="space-y-3 mt-auto">
                    {quizData[currentQIndex].options.map((option, index) => (
                      <button
                        key={index}
                        onClick={() => handleSelectOption(index)}
                        disabled={selectedOption !== null}
                        className={`w-full text-left p-4 rounded-xl border transition-all duration-200 flex items-center justify-between shadow-sm
                          ${selectedOption === index 
                            ? (index === quizData[currentQIndex].answer ? 'bg-teal-50 border-teal-400 text-teal-800' : 'bg-rose-50 border-rose-400 text-rose-800')
                            : 'bg-white border-slate-200 hover:bg-cyan-50 hover:border-cyan-300 text-slate-700'
                          }`}
                      >
                        <span className="font-medium">{option}</span>
                        {selectedOption === index && (
                          index === quizData[currentQIndex].answer 
                            ? <IconCheckCircle2 className="w-5 h-5 text-teal-500" />
                            : <IconXCircle className="w-5 h-5 text-rose-500" />
                        )}
                      </button>
                    ))}
                  </div>
                </div>
              )}

              {step === 'explanation' && (
                <div className="flex-1 flex flex-col items-center justify-center text-center animate-in">
                  <div className={`w-20 h-20 rounded-full flex items-center justify-center mb-6 shadow-md ${isCorrect ? 'bg-teal-100 text-teal-600' : 'bg-rose-100 text-rose-500'}`}>
                    {isCorrect ? <IconCheckCircle2 className="w-12 h-12" /> : <IconXCircle className="w-12 h-12" />}
                  </div>
                  <h3 className={`text-2xl font-bold mb-2 ${isCorrect ? 'text-teal-600' : 'text-rose-600'}`}>
                    {isCorrect ? '정답입니다!' : '아쉽네요!'}
                  </h3>
                  
                  <div className="bg-blue-50/80 rounded-2xl p-5 border border-blue-100 mt-4 text-left w-full shadow-inner">
                    <span className="text-xs font-bold text-cyan-600 uppercase tracking-wider mb-2 block">Story Curation</span>
                    <p className="text-slate-600 text-sm leading-relaxed">
                      {quizData[currentQIndex].explanation}
                    </p>
                  </div>

                  <button 
                    onClick={handleNext}
                    className="w-full mt-8 bg-slate-800 hover:bg-slate-700 text-white font-bold py-4 px-6 rounded-xl flex items-center justify-center space-x-2 transition-all shadow-md"
                  >
                    <span>{currentQIndex < quizData.length - 1 ? '다음 미션으로' : '운명의 큐레이션 받기'}</span>
                    <IconChevronRight className="w-5 h-5" />
                  </button>
                </div>
              )}

              {step === 'analyzing' && (
                <div className="flex-1 flex flex-col items-center justify-center text-center animate-in">
                  <IconLoader2 className="w-16 h-16 text-cyan-500 animate-spin mb-6" />
                  <h2 className="text-2xl font-bold text-slate-800 mb-2">운명의 흐름을 읽는 중...</h2>
                  <p className="text-slate-500 text-sm leading-relaxed">당신의 선택을 바탕으로<br/>오늘 밤 어울리는 루프탑 경험을 분석하고 있습니다.</p>
                </div>
              )}

              {step === 'result' && (
                <div className="flex-1 flex flex-col items-center justify-center text-center animate-in">
                  <div className="relative">
                    <div className="absolute inset-0 bg-amber-300 blur-[25px] opacity-40 rounded-full"></div>
                    <IconAward className="w-16 h-16 text-amber-500 relative z-10 mb-2 drop-shadow-md" />
                  </div>
                  
                  <h2 className="text-2xl font-extrabold text-slate-800 mb-1">
                    Quest Clear!
                  </h2>
                  <p className="text-slate-500 mb-4 text-sm">
                    총 {quizData.length}문제 중 <span className="text-cyan-600 font-bold text-lg">{score}</span>문제를 맞혔습니다.
                  </p>

                  <div className="bg-amber-50 border border-amber-200 rounded-2xl p-4 w-full mb-5 relative overflow-hidden text-left shadow-sm">
                    <span className="text-xs font-bold text-amber-600 uppercase tracking-wider mb-2 flex items-center gap-1">
                      <IconSparkles className="w-3 h-3" /> Secret Curation
                    </span>
                    <p className="text-amber-900 text-sm leading-relaxed italic font-medium">
                      "{aiResult}"
                    </p>
                  </div>

                  <div className="bg-blue-50 border border-blue-200 rounded-2xl p-5 w-full mb-6 relative overflow-hidden">
                    <div className="absolute top-0 right-0 w-16 h-16 bg-blue-100/50 rounded-bl-full"></div>
                    <h3 className="text-md font-bold text-blue-700 mb-2 flex items-center justify-center space-x-2">
                      <IconMapPin className="w-4 h-4 text-blue-500" />
                      <span>기념품 수령 안내</span>
                    </h3>
                    <p className="text-xs text-slate-600 leading-relaxed">
                      이 화면을 <span className="text-amber-600 font-bold">진행 스태프</span> 혹은 프론트 직원에게 보여주시면<br/>
                      약속드린 <span className="text-amber-600 font-bold">특별한 기념품</span>을 드립니다!
                    </p>
                  </div>

                  <button 
                    onClick={() => window.location.reload()}
                    className="text-xs text-slate-400 hover:text-cyan-600 underline underline-offset-4 transition-colors"
                  >
                    처음부터 다시하기
                  </button>
                </div>
              )}

            </div>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
